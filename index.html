<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>Adjie Arya • Creative Developer & Designer</title>
    
    <!-- Meta Tags -->
    <meta name="description" content="Creative Developer & Full Stack Designer. Membangun produk digital dengan fokus pada user experience, desain, dan inovasi.">
    <meta name="keywords" content="creative developer, full stack developer, ui designer, web developer, surabaya, indonesia">
    <meta name="author" content="Adjie Arya">
    <meta name="theme-color" content="#3b82f6">
    
    <!-- Open Graph / Social Media -->
    <meta property="og:title" content="Adjie Arya • Creative Developer & Designer">
    <meta property="og:description" content="Membangun produk digital dengan fokus pada user experience, desain, dan inovasi.">
    <meta property="og:image" content="assets/avatar5.png">
    <meta property="og:url" content="https://adjiearyadev.id">
    <meta property="og:type" content="website">
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Adjie Arya • Creative Developer">
    <meta name="twitter:description" content="Creative Developer & Designer berbasis di Surabaya">
    <meta name="twitter:image" content="assets/avatar5.png">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        primary: '#0a0a0a',
                        secondary: '#3b82f6',
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.6s ease-out',
                        'slide-up': 'slideUp 0.5s ease-out',
                        'pulse-slow': 'pulse 3s infinite',
                    },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' },
                        },
                        slideUp: {
                            '0%': { transform: 'translateY(20px)', opacity: '0' },
                            '100%': { transform: 'translateY(0)', opacity: '1' },
                        },
                    },
                },
            },
        }
    </script>
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="styles/style.css">
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="assets/avatar5.png">
    <link rel="apple-touch-icon" href="assets/avatar5.png">
</head>
<body class="bg-white dark:bg-[#0a0a0a] text-gray-900 dark:text-white font-sans antialiased">
    <!-- Loading Screen -->
    <div id="loading-screen" class="fixed inset-0 bg-white dark:bg-[#0a0a0a] z-50 flex items-center justify-center transition-opacity duration-500">
        <div class="text-center">
            <div class="text-3xl md:text-4xl font-bold tracking-tight mb-3 animate-pulse-slow">Adjie Arya</div>
            <div class="text-sm text-gray-500 dark:text-gray-400">Creative Developer & Designer</div>
        </div>
    </div>

    <!-- Language Toggle - EN/ID -->
    <div class="lang-toggle fixed bottom-6 right-6 z-50 flex gap-2 bg-white/80 dark:bg-gray-900/80 backdrop-blur-md border border-gray-200 dark:border-gray-800 rounded-full p-1 shadow-lg">
        <button class="lang-btn px-4 py-2 text-sm font-medium rounded-full transition-all duration-300" data-lang="en">EN</button>
        <button class="lang-btn px-4 py-2 text-sm font-medium rounded-full transition-all duration-300 active bg-blue-500 text-white" data-lang="id">ID</button>
    </div>

    <!-- Header -->
    <header id="header" class="fixed top-0 w-full z-40 py-4 transition-all duration-300">
        <!-- Navigation akan diisi oleh JavaScript -->
    </header>

    <main>
        <!-- Hero Section -->
        <section id="hero" class="min-h-screen flex items-center pt-20">
            <!-- Konten akan diisi oleh JavaScript -->
        </section>

        <!-- Selected Work Section -->
        <section id="work" class="py-24 md:py-32 bg-gray-50 dark:bg-gray-900/50">
            <!-- Konten akan diisi oleh JavaScript -->
        </section>

        <!-- About Section -->
        <section id="about" class="py-24 md:py-32">
            <!-- Konten akan diisi oleh JavaScript -->
        </section>

        <!-- Stats Section -->
        <section id="stats" class="py-16 border-t border-b border-gray-200 dark:border-gray-800">
            <!-- Konten akan diisi oleh JavaScript -->
        </section>

        <!-- Contact Section -->
        <section id="contact" class="py-24 md:py-32 bg-gradient-to-br from-blue-600 to-purple-600 text-white">
            <!-- Konten akan diisi oleh JavaScript -->
        </section>
    </main>

    <!-- Footer -->
    <footer class="py-8 border-t border-gray-200 dark:border-gray-800">
        <!-- Konten akan diisi oleh JavaScript -->
    </footer>

    <!-- Main JavaScript (Modular) -->
    <script type="module" src="js/modules/app.js"></script>
    
    <!-- Fallback for older browsers -->
    <script>
        // Fallback to hide loading screen if modules fail
        window.addEventListener('load', function() {
            setTimeout(function() {
                const loadingScreen = document.getElementById('loading-screen');
                if (loadingScreen && loadingScreen.style.display !== 'none') {
                    loadingScreen.style.opacity = '0';
                    setTimeout(() => {
                        loadingScreen.style.display = 'none';
                    }, 500);
                }
            }, 3000);
        });
    </script>
</body>
</html>
